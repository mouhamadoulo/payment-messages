services:

  postgres:
    image: postgres:18
    container_name: payment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_messages
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment_messages"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: payment-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@payment.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  ibm-mq:
    image: icr.io/ibm-messaging/mq:latest
    container_name: payment-mq
    restart: unless-stopped
    environment:
      LICENSE: accept
      MQ_QMGR_NAME: QM1
      MQ_APP_PASSWORD: passw0rd
      MQ_ADMIN_PASSWORD: admin
    ports:
      - "1414:1414"
      - "9443:9443"
    volumes:
      - mq_data:/mnt/mqm
    healthcheck:
      test: ["CMD-SHELL", "chkmqhealthy"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: payment-messages-backend:latest
    container_name: payment-backend
    restart: unless-stopped
    environment:
      # Le profil "docker" n'a pas de fichier YAML dedie : tout vient des variables
      # ci-dessous, lues par application.yaml. Evite la dependance a application-dev.yaml.
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/payment_messages
      DB_USER: payment
      DB_PASSWORD: payment
      JPA_DDL_AUTO: update
      MQ_QMGR: QM1
      MQ_CHANNEL: DEV.APP.SVRCONN
      MQ_CONN_NAME: ibm-mq(1414)
      MQ_USER: app
      MQ_PASSWORD: passw0rd
      MQ_QUEUE: PAYMENT.REQUEST.QUEUE
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ibm-mq:
        condition: service_healthy
    healthcheck:
      # curl absent de l'image temurin-jre : test TCP via bash
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: payment-messages-frontend:latest
    container_name: payment-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mq_data:
