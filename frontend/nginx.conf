server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets avec hash : cache long
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # DNS interne Docker : resolution a la volee pour que nginx demarre
    # meme si le service backend n'est pas encore up.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API -> backend Spring Boot (remplace proxy.conf.json du dev-server)
    location /api/ {
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback (routes Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
